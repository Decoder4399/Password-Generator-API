name: CI-pipe

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: 1. code checkout
        uses: actions/checkout@v4

      - name: 2. setup node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 3. install npm
        run: npm install

      - name: 4. run app
        run: echo "App build successful"

        

